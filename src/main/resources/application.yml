spring:
  application:
    name: ticketing-api
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  main:
    allow-circular-references: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-change-this-must-be-at-least-256-bits-long-for-hs256}
    access-ttl: PT15M
    refresh-ttl: P7D
    issuer: ticketing-api
  rate-limit:
    auth-per-minute: 10
    user-per-minute: 100
  idempotency:
    ttl: PT1H
    cleanup-interval: PT15M

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.inghubscl.ticketing: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
